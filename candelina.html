<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spegni la candelina 🎂</title>
<style>
  :root {
    --bg-top: #1a1035;
    --bg-bottom: #2d1b4e;
    --text: #f4eefb;
    --muted: #b8a8d8;
    --accent: #ffb347;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    min-height: 100%;
    background: radial-gradient(ellipse at 50% 20%, var(--bg-bottom), var(--bg-top) 75%);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
    overflow: hidden;
    position: relative;
    padding: 2rem 1rem;
  }

  h1 { font-size: clamp(22px, 5vw, 34px); font-weight: 600; margin: 0; text-align: center; }
  .sub { font-size: 15px; color: var(--muted); margin: 8px 0 0; text-align: center; max-width: 340px; }

  /* ---- Scene ---- */
  .scene {
    flex: 1;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    width: 100%;
    padding-bottom: 20px;
  }
  .cake-stack { position: relative; display: flex; flex-direction: column; align-items: center; }

  /* Candle */
  .candle-wrap { position: relative; display: flex; flex-direction: column; align-items: center; z-index: 3; }

  .flame {
    position: relative;
    width: 26px;
    height: 60px;
    margin-bottom: -6px;
    transform-origin: 50% 100%;
    transition: opacity .25s ease, transform .25s ease;
  }
  .flame::before {
    /* glow */
    content: "";
    position: absolute;
    left: 50%;
    top: 40%;
    width: 90px;
    height: 90px;
    transform: translate(-50%, -50%);
    background: radial-gradient(circle, rgba(255,170,60,.55), rgba(255,120,20,0) 65%);
    z-index: -1;
    animation: glow 1.6s ease-in-out infinite;
  }
  .flame .body {
    position: absolute;
    left: 50%;
    bottom: 0;
    width: 26px;
    height: 60px;
    transform: translateX(-50%);
    background: linear-gradient(to top, #ff5e00 0%, #ff9d00 35%, #ffd000 70%, #fff3b0 100%);
    border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
    box-shadow: 0 0 18px 4px rgba(255,150,30,.6);
    transform-origin: 50% 100%;
    animation: flicker 220ms ease-in-out infinite alternate;
  }
  .flame .inner {
    position: absolute;
    left: 50%;
    bottom: 4px;
    width: 12px;
    height: 30px;
    transform: translateX(-50%);
    background: linear-gradient(to top, #7ea9ff, #cfe0ff 60%, #ffffff);
    border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
    opacity: .9;
    animation: flicker 260ms ease-in-out infinite alternate-reverse;
  }
  .wick {
    width: 3px;
    height: 10px;
    background: #2b2b2b;
    border-radius: 2px;
  }
  .candle-body {
    width: 34px;
    height: 150px;
    border-radius: 8px 8px 4px 4px;
    background:
      repeating-linear-gradient(45deg, rgba(255,255,255,.18) 0 8px, rgba(255,255,255,.05) 8px 16px),
      linear-gradient(to right, #e26d9e, #ff9ec7 45%, #ffd6e6 55%, #e26d9e);
    box-shadow: inset -6px 0 10px rgba(0,0,0,.15), 0 4px 10px rgba(0,0,0,.3);
  }

  /* smoke shown after blown */
  .smoke {
    position: absolute;
    top: 0;
    left: 50%;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: rgba(220,220,220,.35);
    transform: translateX(-50%);
    opacity: 0;
    pointer-events: none;
  }

  /* Cake */
  .cake { position: relative; margin-top: -4px; }
  .frosting {
    width: 220px;
    height: 46px;
    background: linear-gradient(to bottom, #fff6f9, #ffd9e6);
    border-radius: 60% 60% 30% 30% / 80% 80% 20% 20%;
    position: relative;
    z-index: 2;
    box-shadow: 0 6px 12px rgba(0,0,0,.2);
  }
  .frosting::after {
    content: "";
    position: absolute;
    left: 0; right: 0; top: 28px;
    height: 26px;
    background:
      radial-gradient(circle at 12% 0, #fff6f9 12px, transparent 13px),
      radial-gradient(circle at 30% 0, #fff6f9 14px, transparent 15px),
      radial-gradient(circle at 50% 0, #fff6f9 12px, transparent 13px),
      radial-gradient(circle at 70% 0, #fff6f9 14px, transparent 15px),
      radial-gradient(circle at 88% 0, #fff6f9 12px, transparent 13px);
  }
  .base {
    width: 240px;
    height: 90px;
    margin-top: -6px;
    border-radius: 14px 14px 18px 18px;
    background: linear-gradient(to bottom, #b5654a, #8a4632);
    box-shadow: inset 0 -10px 16px rgba(0,0,0,.25), 0 10px 22px rgba(0,0,0,.35);
    position: relative;
    z-index: 1;
  }
  .base::before {
    content: "";
    position: absolute;
    left: 0; right: 0; top: 30px;
    height: 8px;
    background: rgba(255,255,255,.25);
  }
  /* sprinkles */
  .sprinkle { position: absolute; width: 10px; height: 4px; border-radius: 3px; z-index: 3; }

  /* States */
  body.blown .flame { opacity: 0; transform: scaleY(.2); }
  body.blown .flame .body,
  body.blown .flame .inner { animation: none; }

  /* ---- Controls ---- */
  .controls { display: flex; flex-direction: column; align-items: center; gap: 14px; width: 100%; z-index: 5; }
  .mic-btn {
    font-size: 16px;
    font-weight: 600;
    padding: 14px 26px;
    border-radius: 999px;
    border: none;
    background: linear-gradient(135deg, #ff8a4c, #ff5e7e);
    color: #fff;
    cursor: pointer;
    box-shadow: 0 6px 20px rgba(255,94,126,.4);
    transition: transform .12s ease, box-shadow .2s ease, opacity .2s ease;
  }
  .mic-btn:hover { transform: translateY(-1px); }
  .mic-btn:active { transform: scale(.97); }
  .mic-btn:disabled { opacity: .55; cursor: default; box-shadow: none; }

  .status { font-size: 13px; color: var(--muted); min-height: 18px; text-align: center; }

  /* blow meter */
  .meter-wrap {
    width: 220px;
    max-width: 70vw;
    height: 8px;
    background: rgba(255,255,255,.12);
    border-radius: 999px;
    overflow: hidden;
    opacity: 0;
    transition: opacity .3s ease;
  }
  .meter-wrap.on { opacity: 1; }
  .meter-fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #7ee8fa, #ffd36e, #ff6b6b);
    border-radius: 999px;
    transition: width .06s linear;
  }

  .relight-btn {
    font-size: 14px;
    padding: 8px 18px;
    border-radius: 999px;
    border: 1px solid rgba(255,255,255,.25);
    background: transparent;
    color: var(--text);
    cursor: pointer;
    opacity: 0;
    pointer-events: none;
    transition: opacity .3s ease;
  }
  .relight-btn.show { opacity: 1; pointer-events: auto; }

  .celebrate { font-size: 20px; font-weight: 600; height: 26px; opacity: 0; transition: opacity .3s ease; text-align: center; }
  .celebrate.show { opacity: 1; }

  canvas.confetti { position: fixed; inset: 0; width: 100%; height: 100%; pointer-events: none; z-index: 20; }

  @keyframes flicker {
    0%   { transform: translateX(-50%) scaleY(1) scaleX(1) rotate(-1deg); }
    100% { transform: translateX(-52%) scaleY(1.08) scaleX(.94) rotate(1.5deg); }
  }
  @keyframes glow {
    0%,100% { opacity: .8; transform: translate(-50%,-50%) scale(1); }
    50%     { opacity: 1; transform: translate(-50%,-50%) scale(1.12); }
  }
  @keyframes smokeRise {
    0%   { opacity: .5; transform: translate(-50%, 0) scale(1); }
    100% { opacity: 0; transform: translate(-50%, -70px) scale(2.4); }
  }
</style>
</head>
<body>
  <header>
    <h1>🎂 Esprimi un desiderio</h1>
    <p class="sub">Attiva il microfono e soffia sulla candelina per spegnerla.</p>
  </header>

  <div class="scene">
    <div class="cake-stack">
      <div class="candle-wrap">
        <div class="flame" id="flame">
          <div class="body"></div>
          <div class="inner"></div>
          <div class="smoke" id="smoke"></div>
        </div>
        <div class="wick"></div>
        <div class="candle-body"></div>
      </div>
      <div class="cake">
        <div class="frosting" id="frosting"></div>
        <div class="base"></div>
      </div>
    </div>
  </div>

  <div class="controls">
    <p class="celebrate" id="celebrate">Tanti auguri! 🎉</p>
    <div class="meter-wrap" id="meterWrap"><div class="meter-fill" id="meterFill"></div></div>
    <button class="mic-btn" id="micBtn">🎤 Attiva microfono</button>
    <button class="relight-btn" id="relightBtn">Riaccendi la candelina</button>
    <p class="status" id="status"></p>
  </div>

  <canvas class="confetti" id="confetti"></canvas>

<script>
(function () {
  const body = document.body;
  const micBtn = document.getElementById("micBtn");
  const relightBtn = document.getElementById("relightBtn");
  const statusEl = document.getElementById("status");
  const meterWrap = document.getElementById("meterWrap");
  const meterFill = document.getElementById("meterFill");
  const celebrate = document.getElementById("celebrate");
  const smoke = document.getElementById("smoke");
  const flame = document.getElementById("flame");
  const frosting = document.getElementById("frosting");

  let audioCtx = null;
  let analyser = null;
  let dataArray = null;
  let micStream = null;
  let rafId = null;
  let blown = false;
  let blowHold = 0;              // frames the blow has been sustained
  const BLOW_THRESHOLD = 0.14;   // normalized loudness needed
  const HOLD_FRAMES = 4;         // sustained frames required to count as a blow

  // Decorative sprinkles on the frosting
  const sprinkleColors = ["#ff5e7e", "#7ee8fa", "#ffd36e", "#8affc1", "#c58bff"];
  for (let i = 0; i < 14; i++) {
    const s = document.createElement("div");
    s.className = "sprinkle";
    s.style.background = sprinkleColors[i % sprinkleColors.length];
    s.style.left = (8 + Math.random() * 84) + "%";
    s.style.top = (10 + Math.random() * 45) + "%";
    s.style.transform = "rotate(" + (Math.random() * 180) + "deg)";
    frosting.appendChild(s);
  }

  micBtn.addEventListener("click", startMic);
  relightBtn.addEventListener("click", relight);

  async function startMic() {
    micBtn.disabled = true;
    statusEl.textContent = "Richiesta accesso al microfono…";
    try {
      micStream = await navigator.mediaDevices.getUserMedia({ audio: {
        echoCancellation: false, noiseSuppression: false, autoGainControl: false
      }});
    } catch (err) {
      statusEl.textContent = "Microfono non disponibile. Puoi comunque usare il pulsante per spegnere.";
      micBtn.disabled = false;
      micBtn.textContent = "💨 Spegni la candelina";
      micBtn.removeEventListener("click", startMic);
      micBtn.addEventListener("click", blowOut);
      return;
    }

    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const source = audioCtx.createMediaStreamSource(micStream);
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 1024;
    analyser.smoothingTimeConstant = 0.5;
    source.connect(analyser);
    dataArray = new Uint8Array(analyser.fftSize);

    meterWrap.classList.add("on");
    micBtn.textContent = "🎤 In ascolto… soffia!";
    statusEl.textContent = "Soffia forte verso il microfono per spegnerla.";
    listen();
  }

  function listen() {
    analyser.getByteTimeDomainData(dataArray);
    // RMS loudness
    let sum = 0;
    for (let i = 0; i < dataArray.length; i++) {
      const v = (dataArray[i] - 128) / 128;
      sum += v * v;
    }
    const rms = Math.sqrt(sum / dataArray.length);

    // Flame reacts to sound: flicker harder as it gets louder
    const intensity = Math.min(1, rms / BLOW_THRESHOLD);
    if (!blown) {
      const sway = (Math.random() - 0.5) * 10 * intensity;
      const squash = 1 - 0.25 * intensity;
      flame.style.transform = `translateX(${sway}px) scaleY(${squash})`;
      flame.style.opacity = String(1 - 0.35 * intensity);
    }
    meterFill.style.width = Math.min(100, (rms / (BLOW_THRESHOLD * 1.6)) * 100) + "%";

    if (rms > BLOW_THRESHOLD) {
      blowHold++;
      if (blowHold >= HOLD_FRAMES && !blown) blowOut();
    } else {
      blowHold = Math.max(0, blowHold - 1);
    }

    rafId = requestAnimationFrame(listen);
  }

  function blowOut() {
    if (blown) return;
    blown = true;
    body.classList.add("blown");
    flame.style.transform = "";
    flame.style.opacity = "";

    // smoke puff
    smoke.style.animation = "none";
    void smoke.offsetWidth;
    smoke.style.animation = "smokeRise 1.6s ease-out forwards";

    micBtn.disabled = true;
    micBtn.textContent = "Spenta! 🌙";
    statusEl.textContent = "";
    meterWrap.classList.remove("on");
    celebrate.classList.add("show");
    relightBtn.classList.add("show");

    launchConfetti();

    // stop analysing (but keep stream so we can relight without re-prompting)
    if (rafId) cancelAnimationFrame(rafId);
  }

  function relight() {
    blown = false;
    blowHold = 0;
    body.classList.remove("blown");
    celebrate.classList.remove("show");
    relightBtn.classList.remove("show");
    smoke.style.animation = "none";

    if (analyser) {
      meterWrap.classList.add("on");
      micBtn.textContent = "🎤 In ascolto… soffia!";
      statusEl.textContent = "Soffia forte verso il microfono per spegnerla.";
      listen();
    } else {
      micBtn.disabled = false;
    }
  }

  /* ---------- Confetti ---------- */
  const canvas = document.getElementById("confetti");
  const ctx = canvas.getContext("2d");
  let confettiPieces = [];
  let confettiRaf = null;

  function resize() {
    canvas.width = window.innerWidth * devicePixelRatio;
    canvas.height = window.innerHeight * devicePixelRatio;
    ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
  }
  window.addEventListener("resize", resize);
  resize();

  function launchConfetti() {
    const colors = ["#ff5e7e", "#7ee8fa", "#ffd36e", "#8affc1", "#c58bff", "#ffffff"];
    const W = window.innerWidth;
    for (let i = 0; i < 160; i++) {
      confettiPieces.push({
        x: W / 2 + (Math.random() - 0.5) * 120,
        y: window.innerHeight * 0.35 + (Math.random() - 0.5) * 60,
        vx: (Math.random() - 0.5) * 14,
        vy: Math.random() * -14 - 4,
        size: 5 + Math.random() * 7,
        color: colors[(Math.random() * colors.length) | 0],
        rot: Math.random() * Math.PI,
        vrot: (Math.random() - 0.5) * 0.3,
        life: 1
      });
    }
    if (!confettiRaf) confettiRaf = requestAnimationFrame(stepConfetti);
  }

  function stepConfetti() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    const gravity = 0.35;
    confettiPieces.forEach(p => {
      p.vy += gravity;
      p.vx *= 0.99;
      p.x += p.vx;
      p.y += p.vy;
      p.rot += p.vrot;
      p.life -= 0.008;
      ctx.save();
      ctx.globalAlpha = Math.max(0, p.life);
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size * 0.6);
      ctx.restore();
    });
    confettiPieces = confettiPieces.filter(p => p.life > 0 && p.y < window.innerHeight + 40);

    if (confettiPieces.length > 0) {
      confettiRaf = requestAnimationFrame(stepConfetti);
    } else {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      confettiRaf = null;
    }
  }
})();
</script>
</body>
</html>
